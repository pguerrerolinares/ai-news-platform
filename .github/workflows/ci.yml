name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Stage 1: Fast checks (no DB, run in parallel) ──────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Bandit security scan
        run: bandit -r src/ -c pyproject.toml

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pyright
        run: pyright .

  # ── Stage 2: Tests (need DB, wait for lint + typecheck) ─────────
  test:
    name: Unit Tests & Migrations
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ainews_test
          POSTGRES_USER: ainews
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://ainews:testpassword@localhost:5432/ainews_test
      DATABASE_URL_SYNC: postgresql://ainews:testpassword@localhost:5432/ainews_test
      TESTING: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Alembic migrate
        run: alembic upgrade head
      - name: Alembic check (no drift)
        run: alembic check
      - name: Unit tests + coverage
        run: |
          coverage run -m pytest tests/unit/ -v --timeout=30
          coverage report --fail-under=80

  # ── Stage 3: Integration (wait for unit tests) ──────────────────
  integration:
    name: Integration & Security Tests
    needs: [test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ainews_test
          POSTGRES_USER: ainews
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://ainews:testpassword@localhost:5432/ainews_test
      DATABASE_URL_SYNC: postgresql://ainews:testpassword@localhost:5432/ainews_test
      TESTING: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Alembic migrate
        run: alembic upgrade head
      - name: Integration tests
        run: pytest tests/integration/ -v -m integration --timeout=60
      - name: Security tests
        run: pytest tests/security/ -v -m security --timeout=30

  # ── Stage 4: Deploy (only on main, after all tests pass) ──────
  deploy:
    name: Deploy to Coolify
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.COOLIFY_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -f -X POST "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 10
          echo "Deploy triggered successfully"
