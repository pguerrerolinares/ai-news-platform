site_name: "AI News Platform"
site_url: https://pguerrerolinares.github.io/ai-news-platform/
repo_url: https://github.com/pguerrerolinares/ai-news-platform
repo_name: pguerrerolinares/ai-news-platform
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - include-markdown

nav:
  - Home: index.md
  - Overview:
      - Milestone History: milestone-history.md
  - Architecture:
      - Architecture, File Map & API Reference: architecture/agents.md
      - Architecture Overview: architecture/overview.md
      - Architecture Decisions:
          - PostgreSQL over SQLite: architecture/decisions/001-postgresql-over-sqlite.md
          - httpx over requests: architecture/decisions/002-httpx-over-requests.md
          - structlog over stdlib logging: architecture/decisions/003-structlog-over-stdlib.md
          - Kimi/Moonshot as Primary LLM: architecture/decisions/004-kimi-as-primary-llm.md
          - Risk-Based Autonomy for Agent Development: architecture/decisions/005-risk-based-autonomy.md
          - Remote MCP Server via Streamable-HTTP: adr/001-remote-mcp-server.md
  - Frontend:
