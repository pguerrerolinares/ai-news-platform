name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ainews_test
          POSTGRES_USER: ainews
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (pyright)
        run: pyright .

      - name: Security scan (bandit)
        run: bandit -r src/ -c pyproject.toml || bandit -r src/

      - name: Check migrations (alembic)
        env:
          DATABASE_URL_SYNC: postgresql://ainews:testpassword@localhost:5432/ainews_test
        run: alembic upgrade head && alembic check

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://ainews:testpassword@localhost:5432/ainews_test
          DATABASE_URL_SYNC: postgresql://ainews:testpassword@localhost:5432/ainews_test
          TESTING: "1"
        run: |
          coverage run -m pytest tests/ -v --timeout=30
          coverage report --fail-under=80
