# docker-compose.coolify.yml — Coolify deployment
# Coolify's Traefik handles SSL + domain routing → exposes only the frontend.
# Frontend nginx proxies /api/* to the api service internally.
#
# In Coolify: set the "frontend" service as the public-facing service,
# point your domain to port 80 of the frontend container.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-ainews}'
      POSTGRES_USER: '${POSTGRES_USER:-ainews}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainews}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${POSTGRES_USER:-ainews}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ainews}'
      DATABASE_URL_SYNC: 'postgresql://${POSTGRES_USER:-ainews}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ainews}'
      SCHEDULER_ENABLED: 'false'
    env_file:
      - .env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_BASE_PATH: "/ai-news/"
        VITE_API_URL: "/ai-news"
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - coolify
      - default
    labels:
      - "traefik.enable=true"
      # HTTPS router: ai-news bajo /ai-news, StripPrefix antes de nginx (recibe /, /api/...)
      - "traefik.http.routers.ainews-fe-https.rule=Host(`pguerrero.me`) && PathPrefix(`/ai-news`)"
      - "traefik.http.routers.ainews-fe-https.entrypoints=https"
      - "traefik.http.routers.ainews-fe-https.tls=true"
      - "traefik.http.routers.ainews-fe-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ainews-fe-https.priority=50"
      - "traefik.http.routers.ainews-fe-https.middlewares=ainews-fe-strip"
      # HTTP router → redirect a HTTPS (mismo prefijo)
      - "traefik.http.routers.ainews-fe-http.rule=Host(`pguerrero.me`) && PathPrefix(`/ai-news`)"
      - "traefik.http.routers.ainews-fe-http.entrypoints=http"
      - "traefik.http.routers.ainews-fe-http.priority=50"
      - "traefik.http.routers.ainews-fe-http.middlewares=frontend-redirect"
      - "traefik.http.middlewares.frontend-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.ainews-fe-strip.stripprefix.prefixes=/ai-news"
      - "traefik.http.services.ainews-fe.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"
    depends_on:
      api:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    expose:
      - "8001"
    networks:
      - coolify
      - default
    environment:
      MCP_TRANSPORT: 'streamable-http'
      MCP_PORT: '8001'
      MCP_API_BASE_URL: 'http://api:8000'
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      # /mcp returns 405/406 on GET (correct MCP behaviour) — exit 0 on any response
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/mcp | grep -qE '^[0-9]+$' && exit 0 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      # HTTPS router: /ai-news/mcp con StripPrefix → el contenedor recibe /mcp.
      # priority 100 > 50 del frontend para que /ai-news/mcp no caiga en el SPA.
      - "traefik.http.routers.mcp-https.rule=Host(`pguerrero.me`) && PathPrefix(`/ai-news/mcp`)"
      - "traefik.http.routers.mcp-https.entrypoints=https"
      - "traefik.http.routers.mcp-https.tls=true"
      - "traefik.http.routers.mcp-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mcp-https.priority=100"
      - "traefik.http.routers.mcp-https.middlewares=mcp-strip,mcp-ratelimit"
      # HTTP router → redirect to HTTPS
      - "traefik.http.routers.mcp-http.rule=Host(`pguerrero.me`) && PathPrefix(`/ai-news/mcp`)"
      - "traefik.http.routers.mcp-http.entrypoints=http"
      - "traefik.http.routers.mcp-http.middlewares=frontend-redirect"
      - "traefik.http.routers.mcp-http.priority=100"
      # StripPrefix: quita /ai-news → el contenedor recibe /mcp (healthcheck localhost:8001/mcp sigue válido)
      - "traefik.http.middlewares.mcp-strip.stripprefix.prefixes=/ai-news"
      # Backend service
      - "traefik.http.services.mcp.loadbalancer.server.port=8001"
      # Rate-limit middleware: 3 req/s average, burst 10, keyed by IP
      - "traefik.http.middlewares.mcp-ratelimit.ratelimit.average=3"
      - "traefik.http.middlewares.mcp-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.mcp-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"
      - "traefik.docker.network=coolify"

  pipeline-cron:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${POSTGRES_USER:-ainews}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ainews}'
      DATABASE_URL_SYNC: 'postgresql://${POSTGRES_USER:-ainews}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ainews}'
      SCHEDULER_ENABLED: 'true'
    env_file:
      - .env

networks:
  coolify:
    external: true

volumes:
  pgdata:
